<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FM.17 Mitigation Dashboard</title>
  <link rel="stylesheet" href="/fm17/styles.css" />
</head>
<body>
  <main class="container">
    <h1>FM.17 Mitigation Dashboard</h1>

    <section class="panel">
      <h2>Create Mitigation</h2>
      <form id="mitigation-form" novalidate>
        <div class="form-row">
          <label for="riskSourceId">RiskSourceId *</label>
          <input id="riskSourceId" name="riskSourceId" type="text" required />
        </div>

        <div class="form-row">
          <label for="title">Title *</label>
          <input id="title" name="title" type="text" required />
        </div>

        <div class="form-row">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3"></textarea>
        </div>

        <div class="form-row">
          <label for="severityLevel">SeverityLevel (1-5) *</label>
          <input id="severityLevel" name="severityLevel" type="number" min="1" max="5" required />
        </div>

        <div class="form-row">
          <label for="mitigationOwner">MitigationOwner</label>
          <input id="mitigationOwner" name="mitigationOwner" type="text" />
        </div>

        <div class="form-row">
          <label for="dueDate">DueDate</label>
          <input id="dueDate" name="dueDate" type="date" />
        </div>

        <div class="form-row">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="0">Open</option>
            <option value="1">InProgress</option>
            <option value="2">Closed</option>
          </select>
        </div>

        <div class="actions">
          <button type="submit">Create Mitigation</button>
        </div>
        <p id="form-message" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel">
      <h2>Mitigations</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>RiskSourceId</th>
              <th>Title</th>
              <th>Description</th>
              <th>Severity</th>
              <th>Owner</th>
              <th>DueDate</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="mitigations-body">
            <tr>
              <td colspan="7">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/fm17/app.js" defer></script>
</body>
</html>
